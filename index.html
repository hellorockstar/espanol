<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Prisma - 云端记忆卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .card-back { transform: rotateY(180deg); }
        .hidden { display: none !important; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 针对表格横向滑动的隐藏滚动条美化 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4">

    <!-- 顶部导航条 -->
    <header class="w-full max-w-4xl flex justify-between items-center py-4 mb-2">
        <h1 class="text-2xl font-bold text-gray-800 cursor-pointer" onclick="showView('homeView')">🇪🇸 Prisma 云记忆</h1>
        <div class="flex space-x-4">
            <button onclick="showView('dictionaryView')" class="text-indigo-600 hover:text-indigo-800 font-medium">📊 词库</button>
            <button onclick="showView('importView')" class="text-blue-500 hover:text-blue-700 font-medium">+ 导入</button>
            <button onclick="showView('settingsView')" class="text-gray-500 hover:text-gray-700 font-medium">⚙️ 设置</button>
        </div>
    </header>

    <!-- 同步状态提示 -->
    <div id="syncStatus" class="w-full max-w-md text-xs text-center text-gray-500 mb-4 h-4">
        尚未配置云端同步
    </div>

    <!-- 视图：主页 (Dashboard) -->
    <main id="homeView" class="w-full max-w-md flex-1 flex flex-col items-center justify-center space-y-6">
        <div class="bg-white shadow-lg rounded-2xl p-8 w-full text-center">
            <h2 class="text-xl text-gray-600 mb-2">今天需要复习</h2>
            <div class="text-6xl font-extrabold text-blue-600 mb-6" id="dueCount">0</div>
            <p class="text-gray-500 mb-6">总词汇量: <span id="totalCount">0</span></p>
            <button onclick="startReview()" id="startBtn" class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-xl shadow hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition">
                开始复习
            </button>
            <button onclick="syncFromCloud()" class="mt-4 text-sm text-blue-500 hover:text-blue-700 w-full">
                🔄 手动强制同步
            </button>
        </div>
    </main>

    <!-- 视图：复习/记忆卡 -->
    <main id="reviewView" class="w-full max-w-md flex-1 flex flex-col hidden">
        <div class="text-gray-500 text-sm mb-4 text-center">进度: <span id="reviewProgress">1/5</span></div>
        
        <div class="card-container w-full h-80 relative mb-8" onclick="flipCard()">
            <div id="flashcard" class="card w-full h-full cursor-pointer shadow-xl rounded-2xl">
                <!-- 正面 -->
                <div class="card-face bg-white rounded-2xl flex items-center justify-center p-6 border-2 border-gray-100">
                    <h2 id="cardWord" class="text-4xl font-bold text-gray-800 text-center">单词</h2>
                </div>
                <!-- 反面 -->
                <div class="card-back card-face bg-white rounded-2xl flex flex-col items-center justify-center p-6 border-2 border-gray-100">
                    <h2 id="cardMeaning" class="text-3xl font-bold text-gray-800 mb-4 text-center">释义</h2>
                    <div class="w-full bg-blue-50 p-4 rounded-lg text-left">
                        <p id="cardExample" class="text-gray-800 italic mb-2">例句</p>
                        <p id="cardExampleZh" class="text-gray-600 text-sm">翻译</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="actionButtons" class="grid grid-cols-3 gap-3 hidden">
            <button onclick="processReview(1)" class="bg-red-100 text-red-700 py-3 rounded-xl font-bold">忘记</button>
            <button onclick="processReview(3)" class="bg-yellow-100 text-yellow-700 py-3 rounded-xl font-bold">模糊</button>
            <button onclick="processReview(0)" class="bg-green-100 text-green-700 py-3 rounded-xl font-bold">记得</button>
        </div>
        <button onclick="showView('homeView')" class="mt-6 text-gray-400 text-sm text-center w-full">结束复习</button>
    </main>

    <!-- 视图：词库总表 (Dictionary) -->
    <main id="dictionaryView" class="w-full max-w-4xl flex-1 flex flex-col hidden">
        <div class="bg-white shadow-lg rounded-2xl overflow-hidden flex-1 flex flex-col">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">所有词汇</h2>
                <span class="text-sm text-gray-500" id="dictTotalCount">共 0 词</span>
            </div>
            <!-- 表格容器 -->
            <div class="overflow-x-auto hide-scrollbar flex-1 max-h-[70vh]">
                <table class="min-w-full text-left text-sm whitespace-nowrap">
                    <thead class="uppercase tracking-wider sticky top-0 bg-gray-100 border-b shadow-sm z-10">
                        <tr>
                            <th class="px-6 py-4 font-bold text-gray-700">西班牙语</th>
                            <th class="px-6 py-4 font-bold text-gray-700">中文释义</th>
                            <th class="px-6 py-4 font-bold text-gray-700">例句</th>
                            <th class="px-6 py-4 font-bold text-gray-700 text-center">加入时间</th>
                            <th class="px-6 py-4 font-bold text-gray-700 text-center">复习次数</th>
                            <th class="px-6 py-4 font-bold text-gray-700 text-center">最近复习</th>
                        </tr>
                    </thead>
                    <tbody id="dictionaryBody" class="divide-y divide-gray-100">
                        <!-- 动态渲染的行 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 视图：导入数据 -->
    <main id="importView" class="w-full max-w-md flex-1 flex flex-col hidden">
        <div class="bg-white shadow-lg rounded-2xl p-6 w-full">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">粘贴 JSON 导入</h2>
                <button onclick="showView('homeView')" class="text-gray-400">✕ 关闭</button>
            </div>
            <textarea id="jsonInput" class="w-full h-48 border border-gray-300 rounded-lg p-3 text-sm font-mono mb-4" placeholder='输入AI生成的JSON'></textarea>
            <button onclick="importJSON()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">
                导入并同步到云端
            </button>
        </div>
    </main>

    <!-- 视图：云端设置 -->
    <main id="settingsView" class="w-full max-w-md flex-1 flex flex-col hidden">
        <div class="bg-white shadow-lg rounded-2xl p-6 w-full">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">☁️ GitHub 同步设置</h2>
                <button onclick="showView('homeView')" class="text-gray-400">✕ 关闭</button>
            </div>
            <p class="text-xs text-gray-500 mb-4">配置后，你的单词本将自动在 Mac 和 iPhone 间同步。请在 GitHub 申请 Token 和创建 Gist。</p>
            
            <label class="block text-sm font-medium text-gray-700 mb-1">GitHub Token (PAT)</label>
            <input type="password" id="ghToken" class="w-full border border-gray-300 rounded-lg p-2 mb-4" placeholder="ghp_xxxxxxxxx">
            
            <label class="block text-sm font-medium text-gray-700 mb-1">Gist ID</label>
            <input type="text" id="ghGistId" class="w-full border border-gray-300 rounded-lg p-2 mb-6" placeholder="例如: 8a4b2c1d...">
            
            <button onclick="saveSettings()" class="w-full bg-gray-800 text-white font-bold py-3 rounded-xl mb-4">
                保存设置并测试连接
            </button>
            <button onclick="clearData()" class="w-full bg-red-100 text-red-600 font-bold py-3 rounded-xl text-sm">
                ⚠ 清除本地所有数据
            </button>
        </div>
    </main>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed bottom-10 bg-gray-800 text-white px-6 py-3 rounded-full opacity-0 transition-opacity pointer-events-none z-50">
        提示信息
    </div>

    <script>
        let vocabList = [];
        let dueQueue = [];
        let currentCardIndex = 0;
        const FILE_NAME = "prisma_vocab.json";

        // 日期格式化辅助函数
        function formatDate(timestamp) {
            if (!timestamp) return '-';
            // 简单的防呆设计，处理偶尔出现的不合法 ID
            if (timestamp < 1000000000000) return '-'; 
            const d = new Date(timestamp);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // Gist API 辅助函数
        const githubAPI = {
            getToken: () => localStorage.getItem('gh_token'),
            getGistId: () => localStorage.getItem('gh_gist_id'),
            isConfigured: function() { return this.getToken() && this.getGistId(); },
            getHeaders: function() {
                return { 'Accept': 'application/vnd.github.v3+json', 'Authorization': `token ${this.getToken()}` };
            },
            pull: async function() {
                if (!this.isConfigured()) return null;
                try {
                    const res = await fetch(`https://api.github.com/gists/${this.getGistId()}`, { headers: this.getHeaders() });
                    if (!res.ok) throw new Error('读取失败');
                    const data = await res.json();
                    const fileContent = data.files[FILE_NAME]?.content;
                    return fileContent ? JSON.parse(fileContent) : [];
                } catch (e) {
                    console.error(e);
                    return null;
                }
            },
            push: async function(dataArray) {
                if (!this.isConfigured()) return false;
                try {
                    const payload = { files: { [FILE_NAME]: { content: JSON.stringify(dataArray, null, 2) } } };
                    const res = await fetch(`https://api.github.com/gists/${this.getGistId()}`, {
                        method: 'PATCH', headers: this.getHeaders(), body: JSON.stringify(payload)
                    });
                    return res.ok;
                } catch (e) {
                    console.error(e);
                    return false;
                }
            }
        };

        // 初始化
        async function init() {
            const localData = localStorage.getItem('prismaVocab');
            if (localData) vocabList = JSON.parse(localData);
            updateDashboard();

            if (githubAPI.isConfigured()) {
                await syncFromCloud();
            }
        }

        async function syncFromCloud() {
            if (!githubAPI.isConfigured()) {
                showToast('请先在设置中配置 GitHub Token');
                return;
            }
            updateStatus('正在从云端拉取...', true);
            const cloudData = await githubAPI.pull();
            if (cloudData) {
                vocabList = cloudData;
                localStorage.setItem('prismaVocab', JSON.stringify(vocabList));
                updateDashboard();
                updateStatus('✅ 已与云端同步');
            } else {
                updateStatus('❌ 同步失败，请检查设置');
            }
        }

        async function saveToCloud(silent = false) {
            localStorage.setItem('prismaVocab', JSON.stringify(vocabList));
            if (!githubAPI.isConfigured()) return;
            if(!silent) updateStatus('正在同步到云端...', true);
            const success = await githubAPI.push(vocabList);
            if (success) updateStatus('✅ 数据已备份至云端');
            else updateStatus('❌ 云端同步失败，已保存在本地');
        }

        function updateStatus(msg, loading = false) {
            const statusDiv = document.getElementById('syncStatus');
            statusDiv.innerHTML = loading ? `<span class="spinner mr-2"></span> ${msg}` : msg;
        }

        function showView(viewId) {
            ['homeView', 'reviewView', 'importView', 'settingsView', 'dictionaryView'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
            
            if(viewId === 'homeView') updateDashboard();
            if(viewId === 'dictionaryView') renderDictionary();
            if(viewId === 'settingsView') {
                document.getElementById('ghToken').value = githubAPI.getToken() || '';
                document.getElementById('ghGistId').value = githubAPI.getGistId() || '';
            }
        }

        function updateDashboard() {
            const now = new Date().getTime();
            dueQueue = vocabList.filter(v => v.nextReview <= now);
            document.getElementById('totalCount').innerText = vocabList.length;
            document.getElementById('dueCount').innerText = dueQueue.length;
            
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = dueQueue.length === 0;
            startBtn.innerText = dueQueue.length > 0 ? "开始复习" : "今日任务已完成 🎉";
        }

        async function saveSettings() {
            const token = document.getElementById('ghToken').value.trim();
            const gistId = document.getElementById('ghGistId').value.trim();
            localStorage.setItem('gh_token', token);
            localStorage.setItem('gh_gist_id', gistId);
            showToast('设置已保存，正在测试连接...');
            await syncFromCloud();
            showView('homeView');
        }

        async function importJSON() {
            try {
                const input = document.getElementById('jsonInput').value;
                const newWords = JSON.parse(input);
                let addedCount = 0;
                newWords.forEach(wordObj => {
                    if (!vocabList.find(v => v.word === wordObj.word)) {
                        vocabList.push({
                            id: Date.now() + Math.random(), // 既是唯一ID，也用作加入时间的基准
                            word: wordObj.word,
                            meaning: wordObj.meaning,
                            example: wordObj.example,
                            example_zh: wordObj.example_zh,
                            nextReview: new Date().getTime(),
                            interval: 0,
                            reviewCount: 0 // 新增：复习次数初始化
                        });
                        addedCount++;
                    }
                });
                document.getElementById('jsonInput').value = '';
                showToast(`成功导入 ${addedCount} 个新词！`);
                showView('homeView');
                await saveToCloud();
            } catch (e) {
                alert('JSON 格式有误，请检查！');
            }
        }

        // 渲染词库总表
        function renderDictionary() {
            document.getElementById('dictTotalCount').innerText = `共 ${vocabList.length} 词`;
            const tbody = document.getElementById('dictionaryBody');
            tbody.innerHTML = '';
            
            // 按加入时间倒序排列（最新的在最上面）
            const sortedList = [...vocabList].sort((a, b) => b.id - a.id);

            sortedList.forEach((word, index) => {
                const tr = document.createElement('tr');
                if (index % 2 !== 0) tr.classList.add('bg-gray-50'); // 斑马纹
                
                const addedDate = formatDate(word.id);
                const lastReviewed = formatDate(word.lastReviewed);
                const reviewCount = word.reviewCount || 0;
                
                // 根据复习次数给徽章上色
                let badgeClass = "bg-gray-200 text-gray-600";
                if (reviewCount > 5) badgeClass = "bg-green-100 text-green-700";
                else if (reviewCount > 2) badgeClass = "bg-blue-100 text-blue-700";

                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold text-gray-900">${word.word}</td>
                    <td class="px-6 py-4 text-gray-600">${word.meaning}</td>
                    <td class="px-6 py-4 text-gray-500 italic">
                        ${word.example}<br>
                        <span class="text-xs text-gray-400 not-italic">${word.example_zh}</span>
                    </td>
                    <td class="px-6 py-4 text-center text-gray-500">${addedDate}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-2 py-1 rounded-full text-xs font-semibold ${badgeClass}">${reviewCount}</span>
                    </td>
                    <td class="px-6 py-4 text-center text-gray-500">${lastReviewed}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function startReview() {
            if (dueQueue.length === 0) return;
            currentCardIndex = 0;
            showView('reviewView');
            renderCard();
        }

        function renderCard() {
            if (currentCardIndex >= dueQueue.length) {
                showToast("复习完成！");
                showView('homeView');
                saveToCloud(true);
                return;
            }
            const card = dueQueue[currentCardIndex];
            document.getElementById('cardWord').innerText = card.word;
            document.getElementById('cardMeaning').innerText = card.meaning;
            document.getElementById('cardExample').innerText = card.example;
            document.getElementById('cardExampleZh').innerText = card.example_zh;
            document.getElementById('reviewProgress').innerText = (currentCardIndex + 1) + ' / ' + dueQueue.length;
            
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.remove('is-flipped');
            document.getElementById('actionButtons').classList.add('hidden');
        }

        function flipCard() {
            const flashcard = document.getElementById('flashcard');
            if (!flashcard.classList.contains('is-flipped')) {
                flashcard.classList.add('is-flipped');
                document.getElementById('actionButtons').classList.remove('hidden');
            }
        }

        function processReview(btnType) {
            const card = dueQueue[currentCardIndex];
            const now = new Date().getTime();
            const ONE_DAY = 24 * 60 * 60 * 1000;

            if (btnType === 1) {
                card.interval = 1; card.nextReview = now + ONE_DAY;
            } else if (btnType === 3) {
                card.interval = Math.max(card.interval, 3); card.nextReview = now + (3 * ONE_DAY);
            } else if (btnType === 0) {
                if (card.interval === 0) card.interval = 1;
                else if (card.interval === 1) card.interval = 2;
                else if (card.interval === 2) card.interval = 4;
                else if (card.interval === 4) card.interval = 7;
                else if (card.interval === 7) card.interval = 15;
                else card.interval = card.interval * 2;
                card.nextReview = now + (card.interval * ONE_DAY);
            }

            // 新增：追踪复习数据
            card.reviewCount = (card.reviewCount || 0) + 1;
            card.lastReviewed = now;

            const realIndex = vocabList.findIndex(v => v.id === card.id);
            if (realIndex > -1) vocabList[realIndex] = card;
            
            localStorage.setItem('prismaVocab', JSON.stringify(vocabList));
            currentCardIndex++;
            renderCard();
        }

        function clearData() {
            if(confirm('确定要清空本地所有记录吗？（云端数据不会被删除，需手动前往 GitHub 删除）')) {
                localStorage.removeItem('prismaVocab');
                vocabList = [];
                updateDashboard();
                showView('homeView');
                showToast('已清空本地数据');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
        }

        init();
    </script>
</body>
</html>
