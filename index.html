<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Prisma - 云端记忆卡</title>
    <link rel="apple-touch-icon" href="icon.png?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .card-back { transform: rotateY(180deg); }
        .hidden { display: none !important; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-4xl flex justify-between items-center py-4 mb-2">
        <h1 class="text-2xl font-bold text-gray-800 cursor-pointer" onclick="showView('homeView')">🇪🇸 Prisma 云记忆</h1>
        <div class="flex space-x-4">
            <button onclick="showView('dictionaryView')" class="text-indigo-600 hover:text-indigo-800 font-medium">📊 词库</button>
            <button onclick="showView('importView')" class="text-blue-500 hover:text-blue-700 font-medium">+ 导入</button>
            <button onclick="showView('settingsView')" class="text-gray-500 hover:text-gray-700 font-medium">⚙️ 设置</button>
        </div>
    </header>

    <div id="syncStatus" class="w-full max-w-md text-xs text-center text-gray-500 mb-4 h-4">
        尚未配置云端同步
    </div>

    <main id="homeView" class="w-full max-w-md flex-1 flex flex-col items-center justify-center space-y-6">
        <div class="bg-white shadow-lg rounded-2xl p-8 w-full text-center">
            <h2 class="text-xl text-gray-600 mb-2">今天需要复习</h2>
            <div class="text-6xl font-extrabold text-blue-600 mb-6" id="dueCount">0</div>
            <p class="text-gray-500 mb-6">总词汇量: <span id="totalCount">0</span></p>
            <button onclick="startReview()" id="startBtn" class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-xl shadow hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition">
                开始复习
            </button>
            <button onclick="syncFromCloud()" class="mt-4 text-sm text-blue-500 hover:text-blue-700 w-full">
                🔄 手动强制同步
            </button>
        </div>
    </main>

    <main id="reviewView" class="w-full max-w-md flex-1 flex flex-col hidden">
        <div class="text-gray-500 text-sm mb-4 text-center">进度: <span id="reviewProgress">1/5</span></div>
        
        <div class="card-container w-full h-80 relative mb-8" onclick="flipCard()">
            <div id="flashcard" class="card w-full h-full cursor-pointer shadow-xl rounded-2xl">
                <div class="card-face bg-white rounded-2xl flex items-center justify-center p-6 border-2 border-gray-100">
                    <h2 id="cardWord" class="text-4xl font-bold text-gray-800 text-center">单词</h2>
                </div>
                <div class="card-back card-face bg-white rounded-2xl flex flex-col items-center justify-center p-6 border-2 border-gray-100">
                    <h2 id="cardMeaning" class="text-3xl font-bold text-gray-800 mb-4 text-center">释义</h2>
                    <div class="w-full bg-blue-50 p-4 rounded-lg text-left">
                        <p id="cardExample" class="text-gray-800 italic mb-2">例句</p>
                        <p id="cardExampleZh" class="text-gray-600 text-sm">翻译</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="actionButtons" class="grid grid-cols-3 gap-3 hidden">
            <button onclick="processReview(1)" class="bg-red-100 text-red-700 py-3 rounded-xl font-bold">忘记</button>
            <button onclick="processReview(3)" class="bg-yellow-100 text-yellow-700 py-3 rounded-xl font-bold">模糊</button>
            <button onclick="processReview(0)" class="bg-green-100 text-green-700 py-3 rounded-xl font-bold">记得</button>
        </div>
        <button onclick="showView('homeView')" class="mt-6 text-gray-400 text-sm text-center w-full">结束复习</button>
    </main>

    <main id="dictionaryView" class="w-full max-w-4xl flex-1 flex flex-col hidden">
        <div class="bg-white shadow-lg rounded-2xl overflow-hidden flex-1 flex flex-col">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">所有词汇</h2>
                <span class="text-sm text-gray-500" id="dictTotalCount">共 0 词</span>
            </div>
            <div class="overflow-x-auto hide-scrollbar flex-1 max-h-[70vh]">
                <table class="min-w-full text-left text-sm whitespace-nowrap">
                    <thead class="uppercase tracking-wider sticky top-0 bg-gray-100 border-b shadow-sm z-10">
                        <tr>
                            <th class="px-6 py-4 font-bold text-gray-700">西班牙语</th>
                            <th class="px-6 py-4 font-bold text-gray-700">中文释义</th>
                            <th class="px-6 py-4 font-bold text-gray-700">例句</th>
                            <th class="px-6 py-4 font-bold text-gray-700 text-center">加入时间</th>
                            <th class="px-6 py-4 font-bold text-gray-700 text-center">复习次数</th>
